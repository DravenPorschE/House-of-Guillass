<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | House of Guillas</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 1rem; }
        .login-btn:hover { background: #1a252f; }
        .error-msg { color: var(--accent); font-size: 0.9rem; text-align: center; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Portal</h2>
    <div class="form-group">
        <label>Username or Email</label>
        <input type="text" id="admin-identifier" placeholder="Enter admin credentials">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="adminLoginBtn">Access Panel</button>
    <p class="error-msg" id="errorMsg">Invalid credentials. Access denied.</p>
</div>

<script>
    document.getElementById('adminLoginBtn').addEventListener('click', async () => {
        const identifier = document.getElementById('admin-identifier').value;
        const password = document.getElementById('admin-password').value;
        const errorMsg = document.getElementById('errorMsg');

        try {
            const response = await fetch('/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier, password })
            });

            const result = await response.json();

            if (result.success) {
                localStorage.setItem('admin_token', result.token);
                window.location.href = 'admin-panel.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = result.error;
            }
        } catch (err) {
            console.error("Login Error:", err);
        }
    });
</script>

</body>
</html>
