<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | House of Guillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sidebar: #0e1712;
            --sidebar-border: rgba(197,160,89,0.15);
            --gold: #c5a059;
            --gold-dim: rgba(197,160,89,0.12);
            --gold-mid: rgba(197,160,89,0.35);
            --bg: #f5f4f0;
            --surface: #ffffff;
            --text: #1a1a18;
            --text-muted: #888880;
            --border: #e8e6e0;
            --green: #277041;
            --red: #c0392b;
            --blue: #2471a3;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--sidebar-border);
            flex-shrink: 0;
        }

        .sidebar-brand {
            padding: 28px 22px 22px;
            border-bottom: 1px solid var(--sidebar-border);
        }

        .sidebar-brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.03em;
            line-height: 1.2;
        }

        .sidebar-brand-name span { color: var(--gold); }

        .sidebar-brand-sub {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.28);
            margin-top: 4px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255,255,255,0.42);
            transition: background 0.15s, color 0.15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.75);
        }

        .nav-item.active {
            background: var(--gold-dim);
            color: var(--gold);
            border: 1px solid var(--gold-mid);
        }

        .nav-icon {
            font-size: 15px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--sidebar-border);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(192,57,43,0.3);
            background: rgba(192,57,43,0.08);
            color: rgba(220,100,90,0.85);
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.15s;
        }

        .logout-btn:hover {
            background: rgba(192,57,43,0.18);
        }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 32px 36px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .page-header {
            margin-bottom: 24px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 30px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        .page-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 12px 18px;
            text-align: left;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: #fafaf8;
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #fafaf8; }

        tbody td {
            padding: 14px 18px;
            font-size: 13px;
            color: var(--text);
            vertical-align: middle;
        }

        .td-muted {
            color: var(--text-muted);
            font-size: 12px;
        }

        .td-id {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .td-name { font-weight: 500; }

        .delivery-count {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(39,112,65,0.08);
            border: 1px solid rgba(39,112,65,0.2);
            color: var(--green);
            font-size: 12px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .btn {
            padding: 6px 13px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s, background 0.15s;
            letter-spacing: 0.03em;
        }

        .btn:hover { opacity: 0.82; }

        .btn-history {
            background: rgba(36,113,163,0.1);
            border: 1px solid rgba(36,113,163,0.25);
            color: var(--blue);
            margin-right: 6px;
        }

        .btn-reset {
            background: rgba(197,160,89,0.1);
            border: 1px solid rgba(197,160,89,0.3);
            color: #9a7838;
        }

        .actions { display: flex; align-items: center; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(10,15,12,0.55);
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 680px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-head {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 500;
        }

        .modal-close {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.12s;
        }

        .modal-close:hover { background: #f2f2ef; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            background: #fafaf8;
        }

        .history-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .history-order-num {
            font-weight: 500;
            font-size: 13px;
        }

        .history-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .history-items {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .history-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-total {
            font-size: 14px;
            font-weight: 600;
            color: var(--green);
        }

        .history-status {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 20px;
            background: rgba(39,112,65,0.1);
            color: var(--green);
            border: 1px solid rgba(39,112,65,0.2);
        }

        .loading-text {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .empty-text {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .error-text {
            text-align: center;
            padding: 30px;
            color: var(--red);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-name">House of <span>Guillas</span></div>
            <div class="sidebar-brand-sub">Admin Panel</div>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item active" onclick="switchTab('users', this)">
                <span class="nav-icon">👥</span> User Accounts
            </button>
            <button class="nav-item" onclick="switchTab('staff', this)">
                <span class="nav-icon">🧑‍🍳</span> Staff Management
            </button>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="adminLogout()">
                <span>🚪</span> Logout
            </button>
        </div>
    </div>

    <main class="main">
        <div id="tab-users" class="tab-content active">
            <div class="page-header">
                <div>
                    <div class="page-title">User Accounts</div>
                    <div class="page-count" id="user-count"></div>
                </div>
            </div>
            <div class="card">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="tab-staff" class="tab-content">
            <div class="page-header">
                <div>
                    <div class="page-title">Staff Management</div>
                    <div class="page-count" id="staff-count"></div>
                </div>
            </div>
            <div class="card">
                <table id="staffTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Deliveries</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="historyModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-head">
                <div class="modal-title" id="modalTitle">Delivery History</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="historyContainer" class="modal-body"></div>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('admin_token')) window.location.href = 'admin-login.html';

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
            if (tabId === 'users') fetchUsers();
            if (tabId === 'staff') fetchStaff();
        }

        async function fetchUsers() {
            const res = await fetch('/admin/users');
            const data = await res.json();
            document.getElementById('user-count').textContent = data.length + ' accounts';
            const tbody = document.querySelector('#userTable tbody');
            tbody.innerHTML = data.map(u => `
                <tr>
                    <td class="td-id">#${u.user_id}</td>
                    <td class="td-name">${u.full_name}</td>
                    <td class="td-muted">${u.email}</td>
                    <td class="td-muted">${u.phone_number}</td>
                    <td class="actions">
                        <button class="btn btn-reset" onclick="resetPassword('user', ${u.user_id})">Reset Password</button>
                    </td>
                </tr>
            `).join('');
        }

        async function fetchStaff() {
            const res = await fetch('/admin/staff');
            const data = await res.json();
            document.getElementById('staff-count').textContent = data.length + ' members';
            const tbody = document.querySelector('#staffTable tbody');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td class="td-id">#${s.staff_id}</td>
                    <td class="td-name">${s.full_name}</td>
                    <td class="td-muted">${s.email}</td>
                    <td><span class="delivery-count">✓ ${s.delivery_count} completed</span></td>
                    <td class="actions">
                        <button class="btn btn-history" onclick="viewStaffHistory(${s.staff_id})">History</button>
                        <button class="btn btn-reset" onclick="resetPassword('staff', ${s.staff_id})">Reset Password</button>
                    </td>
                </tr>
            `).join('');
        }

        async function resetPassword(type, id) {
            const newPass = prompt("Enter new password for this account:");
            if (!newPass) return;
            const res = await fetch('/admin/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, id, newPass })
            });
            const result = await res.json();
            alert(result.message || result.error);
        }

        async function viewStaffHistory(staffId) {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<div class="loading-text">Loading history…</div>';
            document.getElementById('historyModal').classList.add('open');

            try {
                const res = await fetch(`/admin/staff-history/${staffId}`);
                const orders = await res.json();

                if (orders.length === 0) {
                    container.innerHTML = '<div class="empty-text">No deliveries found for this staff member.</div>';
                    return;
                }

                container.innerHTML = orders.map(order => {
                    const orderNum = order.ORDER_NUMBER || order.order_number;
                    const totalPrice = order.TOTAL_PRICE || order.total_price || 0;
                    const createdAt = order.CREATED_AT || order.created_at;
                    const status = (order.STATUS || order.status || 'Unknown').toLowerCase();
                    const rawCart = order.CART_LIST || order.cart_list;

                    let items = [];
                    try {
                        items = typeof rawCart === 'string' ? JSON.parse(rawCart) : rawCart;
                        if (typeof items === 'string') items = JSON.parse(items);
                    } catch (e) { items = []; }

                    const itemListHtml = items.map(i => `${i.name} × ${i.qty || 1}`).join('<br>');

                    return `
                        <div class="history-card">
                            <div class="history-card-top">
                                <div class="history-order-num">Order #${orderNum}</div>
                                <div class="history-date">${new Date(createdAt).toLocaleString()}</div>
                            </div>
                            <div class="history-items">${itemListHtml}</div>
                            <div class="history-footer">
                                <div class="history-total">₱${parseFloat(totalPrice).toLocaleString()}</div>
                                <div class="history-status">${status}</div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="error-text">Error loading history. Check console for details.</div>';
            }
        }

        function closeModal() {
            document.getElementById('historyModal').classList.remove('open');
        }

        document.getElementById('historyModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function adminLogout() {
            localStorage.removeItem('admin_token');
            window.location.href = 'admin-login.html';
        }

        fetchUsers();
    </script>
</body>
</html>
